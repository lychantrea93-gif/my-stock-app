<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងស្តុក</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4">
    <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">ស្តុកទំនិញបច្ចុប្បន្ន</h1>
    <div id="stock-container" class="space-y-4">
        <p class="text-center text-gray-500">កំពុងទាញទិន្នន័យ...</p>
    </div>

    <script>
        // យក URL ថ្មីដែលទើបតែ Deploy ពីជំហានទី១ មកដាក់ទីនេះ
        const API_URL = "https://script.google.com/macros/s/AKfycbwBC0uoQ-WzB_sLqLCydQ7xRTK9qtSzkwi7JHXvw_t6-SOwcdFG-4sU8f9OS9O7wzRW/exec";

        async function loadStock() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('stock-container');
                container.innerHTML = "";

                data.forEach(item => {
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex justify-between items-center">
                            <div>
                                <p class="text-lg font-bold text-gray-800">${item.ItemName || 'មិនមានឈ្មោះ'}</p>
                                <p class="text-sm text-gray-500">តម្លៃ: $${item.Price || '0'}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-bold text-blue-600">${item.Quantity || '0'}</p>
                                <p class="text-xs text-gray-400 uppercase">ចំនួនក្នុងស្តុក</p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('stock-container').innerHTML = "<p class='text-red-500 text-center'>មានកំហុសក្នុងការទាញទិន្នន័យ!</p>";
            }
        }
        window.onload = loadStock;
    </script>
</body>
</html>
