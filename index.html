<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងស្តុក</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kantumruy Pro', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="p-4 bg-gray-100">
    
    <div class="flex items-center justify-center gap-2 mb-6 p-4 bg-white rounded-2xl shadow-sm">
        <img src="https://cdn-icons-png.flaticon.com/512/3211/3211181.png" alt="Logo" class="w-12 h-12 object-contain">
        <h1 class="text-2xl font-bold text-gray-800 text-center">ប្រព័ន្ធគ្រប់គ្រងស្តុក</h1>
    </div>

    <div id="stock-list" class="space-y-4">
        <p class="text-center text-gray-500">កំពុងទាញទិន្នន័យ...</p>
    </div>

    <script>
        // URL នៃ Google Apps Script របស់អ្នក (ទុកដដែល)
        const API_URL = "https://script.google.com/macros/s/AKfycbx4Q4vyXoFyt9wAnHJtJuc9pxS-DNL0DXXwKltLCNM3XISE_j4tOfRO4kcEtct12qmS/exec";

        async function loadStock() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('stock-list');
                container.innerHTML = "";

                if (data.length === 0) {
                    container.innerHTML = "<p class='text-center text-gray-500'>មិនមានទំនិញក្នុងស្តុក!</p>";
                    return;
                }

                data.forEach(item => {
                    // លីងរូបភាពទំនិញលំនាំដើម បើក្នុង Sheet មិនមានដាក់ URL
                    const itemImage = item.ItemImage ? item.ItemImage : "https://cdn-icons-png.flaticon.com/512/679/679821.png";

                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl shadow-sm flex items-center gap-4 transition-transform hover:scale-[1.02]">
                            <img src="${itemImage}" alt="${item.ItemName}" class="w-16 h-16 rounded-xl object-cover border border-gray-100">
                            
                            <div class="flex-grow">
                                <p class="text-lg font-bold text-gray-900 leading-tight">${item.ItemName}</p>
                                <p class="text-sm text-gray-500">តម្លៃ: <span class="text-gray-800 font-medium">$${parseFloat(item.Price).toFixed(2)}</span></p>
                            </div>
                            
                            <div class="text-right flex-shrink-0">
                                <p class="text-3xl font-bold text-blue-600">${item.Quantity}</p>
                                <p class="text-xs text-gray-400 mt-[-5px]">ក្នុងស្តុក</p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('stock-list').innerHTML = "<p class='text-center text-red-500 font-medium p-4 bg-white rounded-xl shadow'>មានបញ្ហាពេលទាញទិន្នន័យ! សូមពិនិត្យសិទ្ធិ ឬ URL ម្តងទៀត។</p>";
                console.error("Error fetching data:", error);
            }
        }

        window.onload = loadStock;
    </script>
</body>
</html>
