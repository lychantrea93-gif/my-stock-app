<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងស្តុក - BoQ Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background-image: url('https://i.pinimg.com/736x/3b/64/77/3b6477bdeda5399ac3075cc8a9bd690e.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
        }
        .overlay-bg {
            background-color: rgba(255, 255, 255, 0.85); /* បង្កើនភាពច្បាស់ដើម្បីស្រួលមើលអក្សរ */
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            min-height: 95vh;
            max-width: 600px;
            margin: 15px auto;
        }
        .stock-card {
            transition: transform 0.2s;
        }
        .stock-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="p-2">
    <div class="overlay-bg shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-blue-800">📦 ស្ថានភាពស្តុកការដ្ឋាន</h1>
            <button onclick="loadStock()" class="bg-blue-600 text-white p-2 rounded-full shadow-md hover:bg-blue-700">
                🔄
            </button>
        </div>
        
        <div id="stock-container" class="space-y-3">
            <div class="flex justify-center items-center h-40">
                <p class="text-blue-600 animate-pulse font-bold">កំពុងទាញទិន្នន័យពីឃ្លាំង...</p>
            </div>
        </div>
        
        <p class="text-[10px] text-center text-gray-500 mt-6">បច្ចុប្បន្នភាពចុងក្រោយ: <span id="last-update">-</span></p>
    </div>

    <script>
        // ប្រើ URL នៃ Web App ដែលអ្នកបាន Deploy ចេញពី Apps Script
        const API_URL = "https://script.google.com/macros/s/AKfycbwSvbP82nh3MGXYpBKMf9PgO6G4wyunTI7X1RPsPY-auAFXT8XuN4ceME7F8xtLVmbV/exec";

        async function loadStock() {
            const container = document.getElementById('stock-container');
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                container.innerHTML = "";

                data.forEach(item => {
                    // កំណត់ពណ៌តាមចំនួនស្តុក (បើអស់ដាក់ពណ៌ក្រហម)
                    const stockQty = parseFloat(item.Rem_In_Warehouse) || 0; // ប្រើជួរឈរ H ពី BoQ_Monitoring
                    const cardBg = stockQty <= 0 ? 'bg-red-50 border-red-200' : 'bg-white border-blue-100';
                    const qtyColor = stockQty <= 0 ? 'text-red-600' : 'text-blue-700';

                    container.innerHTML += `
                        <div class="stock-card ${cardBg} p-3 rounded-2xl shadow-sm border flex items-center space-x-4">
                            <div class="relative">
                                <img src="${item.ItemImage || 'https://via.placeholder.com/80'}" 
                                     class="w-16 h-16 object-cover rounded-xl shadow-inner bg-gray-50">
                            </div>
                            
                            <div class="flex-1">
                                <p class="text-sm font-bold text-gray-800 leading-tight">${item.ItemName || 'មិនមានឈ្មោះ'}</p>
                                <div class="flex items-center mt-1 space-x-2">
                                    <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold">${item.ID || 'N/A'}</span>
                                    <span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${item.Zone || 'General'}</span>
                                </div>
                            </div>

                            <div class="text-right border-l pl-3 border-gray-100 min-w-[70px]">
                                <p class="text-xl font-black ${qtyColor}">${stockQty}</p>
                                <p class="text-[9px] text-gray-400 uppercase font-bold">ក្នុងស្តុក</p>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                container.innerHTML = `
                    <div class='bg-red-100 text-red-600 p-4 rounded-xl text-center font-bold'>
                        ⚠️ មិនអាចទាញទិន្នន័យបានទេ!<br>
                        <span class='text-xs font-normal'>សូមពិនិត្យមើលការកំណត់ Web App របស់អ្នក</span>
                    </div>`;
            }
        }
        window.onload = loadStock;
    </script>
</body>
</html>
